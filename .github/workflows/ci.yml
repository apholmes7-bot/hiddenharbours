# Hidden Harbours — Continuous Integration
# Runs the Unity EditMode + PlayMode tests on every push/PR so `main` stays green
# (CLAUDE.md rule 10, agents/coordination.md §4-§5). Owned by qa-test.
#
# WHY BUILDALON (and not GameCI): Unity 6 issues a machine-bound "entitlement" license,
# and Unity removed manual `.ulf` activation for free Personal licenses back in ~2023.
# GameCI's Docker test-runner is hard-wired to need a `.ulf` that a Personal seat can no
# longer produce, so it cannot work for this project. The Buildalon actions activate a
# Personal license at runtime against Unity's licensing servers using just an email +
# password — no `.ulf` file and no serial number.
#
# ONE-TIME SETUP (required before this can pass) — add two repository secrets under
# Settings ▸ Secrets and variables ▸ Actions ▸ "New repository secret":
#     UNITY_EMAIL     = the email address for your Unity ID
#     UNITY_PASSWORD  = the password for your Unity ID
# No serial and no `.ulf` are needed for a Personal license. NOTE: the Unity account must
# NOT have two-factor (2FA) on password login, or the automated activation will fail.
# Until these secrets exist, the "Activate Unity license" step fails — that is expected.
#
# The third-party Buildalon actions are pinned to commit SHAs (supply-chain hygiene) because
# they receive the Unity credentials. To bump one, update the SHA *and* its trailing
# `# vX` comment together.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A new push to the same branch cancels the previous (still-running) CI — Unity installs are
# expensive, so don't burn runner minutes on a run that's already superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: EditMode + PlayMode tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Set up Unity
        uses: buildalon/unity-setup@30fcbcb56c10ea5d64298e970d952b8d29bc268b # v2
        with:
          version-file: 'ProjectSettings/ProjectVersion.txt'   # resolves to 6000.5.0f1
          build-targets: StandaloneLinux64
          cache-installation: true                             # cache the multi-GB editor between runs

      - name: Activate Unity license (Personal)
        uses: buildalon/activate-unity-license@e0d245d0787b7b9931b56ccbde3b508f6b70f1af # v2
        with:
          license: Personal
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: EditMode tests
        uses: buildalon/unity-action@2d420bea0f47fbe01377601fa3231bcf4de04f3a # v3
        with:
          log-name: editmode-tests
          args: -batchmode -runTests -testPlatform EditMode -testResults ${{ github.workspace }}/artifacts/editmode-results.xml

      - name: PlayMode tests
        # Run even if EditMode failed, so a single CI run reports both suites.
        if: success() || failure()
        uses: buildalon/unity-action@2d420bea0f47fbe01377601fa3231bcf4de04f3a # v3
        with:
          log-name: playmode-tests
          args: -batchmode -runTests -testPlatform PlayMode -testResults ${{ github.workspace }}/artifacts/playmode-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts
